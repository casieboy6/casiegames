<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <title>Casie Jumper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>
  <input id="name-input" type="text" maxlength="16" autocomplete="off" autocapitalize="characters" dir="ltr"
    style="position:fixed;left:0;top:0;opacity:0;width:1px;height:1px;pointer-events:none;">
  <div id="rotate-overlay">
    <p>Please rotate your device to landscape mode</p>
  </div>
  <script src="game.js"></script>
</body>
</html>
