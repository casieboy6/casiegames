<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <title>Casie Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Press Start 2P', monospace;
      min-height: 100vh;
      padding: 40px 20px 120px;
      image-rendering: pixelated;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 48px;
    }

    .header img {
      width: auto;
      height: 64px;
      image-rendering: pixelated;
    }

    .header h1 {
      font-size: 2rem;
      color: #f5a623;
      text-shadow: 3px 3px 0 #000;
    }

    .game-list {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .game-card {
      display: flex;
      align-items: center;
      gap: 24px;
      background: #16213e;
      border: 3px solid #0f3460;
      padding: 16px;
      text-decoration: none;
      color: #e0e0e0;
      transition: border-color 0.15s, transform 0.15s;
    }

    .game-card:hover {
      border-color: #f5a623;
      transform: translateY(-2px);
    }

    .game-card img {
      width: 180px;
      height: auto;
      flex-shrink: 0;
      image-rendering: pixelated;
      border: 2px solid #0f3460;
    }

    .game-info h2 {
      font-size: 0.9rem;
      color: #f5a623;
      margin-bottom: 12px;
    }

    .game-info p {
      font-size: 0.7rem;
      line-height: 1.8;
      color: #a0a0b8;
    }

    .mascot-corner {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 200px;
      height: auto;
      pointer-events: none;
      image-rendering: pixelated;
    }

    @media (max-width: 600px) {
      .header h1 { font-size: 1.2rem; }
      .header img { height: 48px; width: auto; }

      .game-card {
        flex-direction: column;
        text-align: center;
      }

      .game-card img { width: 100%; }
      .mascot-corner { width: 120px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="mascotte.png" alt="Casie mascot">
    <h1>Casie Games</h1>
  </div>

  <div class="game-list">
    <a class="game-card" href="casie-jumper/">
      <img src="casie-jumper.png" alt="Casie Jumper screenshot">
      <div class="game-info">
        <h2>Casie Jumper</h2>
        <p>A game where you jump from one platform to the next. There are special platforms that have some surprises in store for you. How high can you get?</p>
      </div>
    </a>
  </div>

  <img class="mascot-corner" src="mascotte-wave.png" alt="Casie waving">
</body>
</html>
